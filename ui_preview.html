<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAILY UI Preview - Neo-Brutalism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg: #121212;
            --white: #FFFFFF;
            --black: #000000;
            --accent: #FF5C00; /* Safety Orange */
            --accent-soft: #FF9800;
            --border-width: 3px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .phone-mockup {
            width: 375px;
            height: 812px;
            background: var(--bg);
            border: 8px solid #222;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 14px;
            font-weight: 700;
        }

        .screen {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Login UI Styling */
        .logo-frame {
            width: 80px;
            height: 80px;
            background-color: var(--accent);
            border: var(--border-width) solid var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px auto 20px;
            box-shadow: 6px 6px 0px var(--black);
        }

        .logo-frame svg { width: 40px; height: 40px; fill: var(--black); }

        .app-name {
            font-weight: 900;
            font-size: 44px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .auth-card {
            background-color: var(--white);
            border: var(--border-width) solid var(--black);
            padding: 24px;
            box-shadow: 8px 8px 0px var(--black);
        }

        .input-label {
            color: var(--black);
            font-weight: 900;
            font-size: 10px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-box {
            background: var(--white);
            border: 2px solid var(--black);
            padding: 14px;
            margin-bottom: 16px;
            font-weight: 700;
            color: var(--black);
        }

        .btn-primary {
            background-color: var(--accent);
            border: 2px solid var(--black);
            padding: 16px;
            text-align: center;
            font-weight: 900;
            color: var(--black);
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            margin-top: 10px;
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--black);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding-bottom: 20px;
        }

        .footer span { font-weight: 400; color: #888; }
        .footer a { font-weight: 900; color: var(--accent); text-decoration: underline; }

        /* Demo Carousel */
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: var(--white);
            border: 2px solid var(--black);
            padding: 8px 16px;
            font-weight: 900;
            color: var(--black);
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
        }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <div class="status-bar">
            <span>9:41</span>
            <div>📶 🔋</div>
        </div>
        
        <div class="screen" id="main-screen">
            <div class="logo-frame">
                <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            </div>
            <div class="app-name">SAILY</div>

            <div class="auth-card">
                <div class="input-label">IDENTIFIER</div>
                <div class="input-box">Username, Email or Mobile</div>

                <div class="input-label">PASSWORD</div>
                <div class="input-box">••••••••••••</div>

                <div class="btn-primary">CONNECT TO SAILY</div>
            </div>

            <div class="footer">
                <span>New here?</span> <a href="#">START SAILING</a>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-btn" onclick="alert('This is the Neo-Brutalist Login Screen you approved!')">LOG IN</div>
        <div class="control-btn" onclick="alert('The feed will follow the same bold 3px border aesthetic.')">FEED</div>
    </div>

</body>
</html>
